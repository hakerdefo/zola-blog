{% extends "index.html" %}

{% import "macros/post.html" as post_macros %}

{% block content %}
    <div class="post">
        <h1 class="post-title">
            #{{ term.name }}
            <span class="tag-count">({{ term.pages | length }} post{{ term.pages | length | pluralize }})</span>
        </h1>

        <a href="{{ config.base_url | safe }}/tags">← All Tags</a>

        {{ post_macros::list_posts(pages=term.pages) }}
    </div>
{% endblock content %}
